session_name: docker_hardware_ground_robot
windows:
  - window_name: main
    layout: main-horizontal
    options:
      main-pane-height: 50%
    shell_command_before:
      - source /opt/ros/humble/setup.bash
      - source /home/swarm/.bashrc
    panes:
      # System monitor
      - shell_command:
        - htop

      # Traj bring up for dynamic obstacles
      - shell_command:
        - source /home/swarm/code/trajectory_generator_ws/install/setup.bash
        - ros2 launch traj_bringup hardware.launch.py traj_shape:=8

      # Livox
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch livox_ros_driver2 run_MID360_launch.py namespace:=$ROVER_NAME

      # DLIO
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch direct_lidar_inertial_odometry dlio.launch.py namespace:=$ROVER_NAME

      # Static TF
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        # - ros2 run tf2_ros static_transform_publisher 0 0 0 0 0 0 $ROVER_NAME/base_link $ROVER_NAME/lidar
        - ros2 run tf2_ros static_transform_publisher 0 0 0 0 0.3490659 0 $ROVER_NAME/base_link $ROVER_NAME/lidar

